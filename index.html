<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación Bautizo</title>

<!-- FUENTES ELEGANTES -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(#fce4ec,#ffffff);
  overflow:hidden;
}

/* PANTALLA INICIAL */
#inicio{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.sobre{
  width:250px;
  height:180px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.5s;
}

.sobre:hover{
  transform:scale(1.1);
}

.sobre p{
  font-family:'Great Vibes',cursive;
  font-size:30px;
  color:#d81b60;
}

/* CONTENIDO */
#contenido{
  display:none;
  padding:30px;
  text-align:center;
  animation:fadeIn 2s;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(50px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:50px;
  color:#d81b60;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  margin:20px auto;
  max-width:400px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:10px 20px;
  background:#d81b60;
  color:white;
  border-radius:25px;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  background:#ad1457;
}

/* BOTÓN MÚSICA */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#d81b60;
  color:white;
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
  <div class="sobre" onclick="abrir()">
    <p>💌 Abrir</p>
  </div>
</div>

<!-- CONTENIDO -->
<div id="contenido">

<h1>Mi Bautizo</h1>

<div class="card">
  <b>Padrinos</b><br>
  Carlos Fajardo<br>
  Teresa Chauca
</div>

<div class="card">
  <b>Fecha:</b> 22 de Agosto 2026<br>
  <b>Hora:</b> 3:30 PM<br>
  <b>Lugar:</b> Santuario Virgen del Rocío
</div>

<a class="btn" target="_blank"
href="https://www.google.com/maps/search/?api=1&query=Santuario+de+la+Virgen+del+Roc%C3%ADo+Biblian">
📍 Ver ubicación
</a>

<a class="btn" target="_blank"
href="https://wa.me/593987311469?text=Confirmo%20mi%20asistencia">
💬 Confirmar asistencia
</a>

<p style="margin-top:20px; font-style:italic;">
“El amor nos ha llevado a este momento mágico.”
</p>

</div>

<!-- MÚSICA -->
<div class="music" onclick="toggleMusic()">▶</div>

<audio id="audio" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b7d31.mp3">
</audio>

<script>
function abrir(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("contenido").style.display="block";
  document.body.style.overflow="auto";
}

let playing=false;

function toggleMusic(){
  let audio=document.getElementById("audio");

  if(!playing){
    audio.play();
    playing=true;
  }else{
    audio.pause();
    playing=false;
  }
}
</script>

</body>
</html>
